<style>
:root{--pri:#1B2A4A;--pri-l:#2D4A7A;--pri-d:#0F1B33;--acc:#D4A853;--acc-l:#E8C97A;--bg:#F4F1EC;--bgc:#FFF;--bgs:#1B2A4A;--tx:#1A1A1A;--txl:#6B7280;--txm:#9CA3AF;--brd:#E5E1DA;--ok:#059669;--okb:#D1FAE5;--okt:#065F46;--wn:#D97706;--wnb:#FEF3C7;--wnt:#92400E;--er:#DC2626;--erb:#FEE2E2;--ert:#991B1B;--or:#EA580C;--orb:#FED7AA;--ort:#9A3412;--inf:#2563EB;--infb:#DBEAFE;--inft:#1E40AF;--r:10px;--rl:14px}

.b-ouro{background:#FEF3C7;color:#92400E}.b-prata{background:#F3F4F6;color:#374151}.b-diamante{background:#EDE9FE;color:#5B21B6}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:20px}.modal.on{display:flex}.mc{background:var(--bgc);border-radius:var(--rl);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.12)}

.kcd{background:var(--bgc);border-radius:8px;padding:12px;border:1px solid var(--brd);cursor:pointer;transition:all .2s}.kcd:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);transform:translateY(-1px)}

.spin{width:36px;height:36px;border:3px solid var(--brd);border-top-color:var(--pri);border-radius:50%;animation:sp .6s linear infinite;margin:40px auto}@keyframes sp{to{transform:rotate(360deg)}}
.ep{display:flex;align-items:center;gap:0;overflow-x:auto;padding:20px 0}.epi{display:flex;flex-direction:column;align-items:center}.epc{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;border:2px solid var(--brd);background:#fff;color:var(--txl)}
.epc.dn{background:var(--ok);border-color:var(--ok);color:#fff}.epc.cr{background:var(--inf);border-color:var(--inf);color:#fff;animation:pu 2s infinite}.epc.pd{background:#F3F4F6}@keyframes pu{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.3)}50%{box-shadow:0 0 0 8px rgba(37,99,235,0)}}
.epl{width:32px;height:2px;background:var(--brd);flex-shrink:0}.epl.dn{background:var(--ok)}.epn{font-size:11px;text-align:center;margin-top:6px;color:var(--txl);max-width:72px}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--brd);margin-bottom:24px;overflow-x:auto}.tb{padding:10px 20px;font-family:inherit;font-size:14px;font-weight:500;color:var(--txl);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;white-space:nowrap;transition:all .2s}.tb.on{color:var(--pri);border-bottom-color:var(--pri)}.tp{display:none}.tp.on{display:block}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--pri-d) 0%,var(--pri) 50%,var(--pri-l) 100%);padding:20px}

.empty{text-align:center;padding:60px 20px;color:var(--txl)}.empty h3{font-size:18px;font-weight:500;margin-bottom:6px;color:var(--tx)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.fx{display:flex}.ac{align-items:center}.jb{justify-content:space-between}.g8{gap:8px}.g16{gap:16px}.mt8{margin-top:8px}.mt16{margin-top:16px}.mt24{margin-top:24px}.mb16{margin-bottom:16px}.mb24{margin-bottom:24px}.tc{text-align:center}.txs{font-size:12px}.ts{font-size:13px}.tlt{color:var(--txl)}.trn{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.cp{cursor:pointer}.fw{flex-wrap:wrap}
.obs-item{padding:10px 0;border-bottom:1px solid var(--brd)}.obs-item:last-child{border:none}.obs-meta{font-size:11px;color:var(--txm)}.obs-text{font-size:14px;margin-top:4px}
.foto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-top:10px}
.foto-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid var(--brd);cursor:pointer}
.foto-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.foto-thumb .foto-del{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:rgba(220,38,38,.85);color:#fff;border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.foto-thumb:hover .foto-del{opacity:1}
.foto-upload-area{border:2px dashed var(--brd);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;background:var(--bg)}
.foto-upload-area:hover{border-color:var(--pri)}
.foto-upload-area p{font-size:13px;color:var(--txl);margin-top:6px}
.foto-upload-area svg{width:32px;height:32px;color:var(--txl)}
.foto-preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:10px}
.foto-preview{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;border:1px solid var(--brd)}
.foto-preview img{width:100%;height:100%;object-fit:cover}
.foto-preview .fp-del{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(220,38,38,.9);color:#fff;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9000;align-items:center;justify-content:center;padding:20px}.lightbox.on{display:flex}
.lightbox img{max-width:95%;max-height:90vh;border-radius:8px}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:24px;cursor:pointer}
.peso-box{background:var(--bg);border-radius:10px;padding:16px;margin:12px 0;border:1px solid var(--brd)}
.peso-bar{height:10px;background:#E5E1DA;border-radius:6px;overflow:hidden;margin:10px 0}
.peso-bar-fill{height:100%;background:linear-gradient(90deg,var(--ok) 0%,var(--ok) 100%);transition:width .3s}
.peso-bar-fill.incomplete{background:linear-gradient(90deg,var(--wn) 0%,var(--wn) 100%)}
.sp-item{background:var(--bg);border-radius:8px;padding:12px;margin-bottom:8px;border-left:4px solid var(--acc)}
.cli-auto{position:relative}.cli-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid var(--brd);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.08);max-height:260px;overflow-y:auto;z-index:40;display:none}.cli-results.on{display:block}.cli-opt{padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--brd);font-size:14px}.cli-opt:last-child{border-bottom:none}.cli-opt:hover,.cli-opt.on{background:var(--bg)}.cli-opt strong{display:block;color:var(--tx)}.cli-opt span{display:block;font-size:12px;color:var(--txl);margin-top:2px}.cli-chip{display:none;align-items:center;justify-content:space-between;gap:12px;padding:10px 14px;border:1px solid var(--brd);border-radius:10px;background:var(--bg);margin-top:8px}.cli-chip.on{display:flex}.cli-chip strong{display:block}.cli-chip span{display:block;font-size:12px;color:var(--txl)}

<body>
<div id="vLogin" style="display:none"><div class="lw"><div class="lb"><div class="logo">Scarlat Galvânica</div><h1>Cronograma de Produção</h1><p class="sub">Entre com suas credenciais</p><div class="lerr" id="lErr"></div><form onsubmit="doLogin(event)"><div class="fg"><label>E-mail</label><input type="email" id="iEm" class="fc" placeholder="seu@email.com" required></div><div class="fg"><label>Senha</label><input type="password" id="iPw" class="fc" placeholder="Sua senha" required></div><button type="submit" class="btn bp blg bbl mt16" id="bLog">Entrar</button></form></div></div></div>
<div id="vApp" style="display:none"><button class="mtog" onclick="tgM()">&#9776;</button><div class="sov" id="sOv" onclick="tgM()"></div><div class="app"><aside class="side" id="sBar"><div class="side-logo"><h1>Cronograma</h1><span>Scarlat Galvânica</span></div><nav class="snav" id="sNav"></nav><div class="su"><div class="su-av" id="uA">?</div><div class="su-i"><div class="n" id="uN">...</div><div class="p" id="uP">—</div></div><button class="bout" onclick="doOut()" title="Sair"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button></div></aside><main class="mn" id="pg"></main></div></div>

<!-- MODALS -->
<div class="modal" id="mCli"><div class="mc" style="max-width:450px"><div class="mh"><h3 id="mCliTitle">Novo Cliente</h3><button class="mx" onclick="cM('mCli')">&times;</button></div><div class="mb"><input type="hidden" id="cId"><div class="fg"><label>Nome *</label><input type="text" id="cN" class="fc"></div><div class="fg"><label>Telefone</label><input type="text" id="cT" class="fc"></div><div class="fg"><label>E-mail</label><input type="email" id="cE" class="fc"></div><div class="fg"><label>Observações</label><textarea id="cObs" class="fc"></textarea></div></div><div class="mf"><button class="btn bo" onclick="cM('mCli')">Cancelar</button><button class="btn bp" onclick="svCli()">Salvar</button></div></div></div>

function parsePesoInput(v){
  if(v===null||v===undefined)return NaN;
  let s=String(v).trim();
  if(!s)return NaN;
  s=s.replace(/\s+/g,'');
  if(s.includes(',')&&s.includes('.')){
    s=s.replace(/\./g,'').replace(',', '.');
  }else if(s.includes(',')){
    s=s.replace(',', '.');
  }
  s=s.replace(/[^0-9.\-]/g,'');
  const parts=s.split('.');
  if(parts.length>2){
    s=parts.shift()+'.'+parts.join('');
  }
  return Number(s);
}

let _pendingFiles=[];
function renderUploadArea(containerId,inputId){return `<div class="foto-upload-area" onclick="document.getElementById('${inputId}').click()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><p>Toque para tirar foto ou selecionar da galeria</p><input type="file" id="${inputId}" accept="image/*" capture="environment" multiple style="display:none" onchange="previewFiles(this,'${containerId}')"></div><div class="foto-preview-grid" id="${containerId}"></div>`}
function previewFiles(input,containerId){const cont=document.getElementById(containerId);const files=Array.from(input.files);files.forEach(f=>{if(f.size>10*1024*1024){toast('Arquivo muito grande (máx 10MB)','er');return}if(!f.type.startsWith('image/')){toast('Apenas imagens','er');return}const idx=_pendingFiles.length;_pendingFiles.push(f);const reader=new FileReader();reader.onload=e=>{cont.innerHTML+=`<div class="foto-preview" id="fp_${idx}"><img src="${e.target.result}"><button class="fp-del" onclick="removePending(${idx},'fp_${idx}')">&times;</button></div>`};reader.readAsDataURL(f)});input.value=''}
function removePending(idx,elId){_pendingFiles[idx]=null;const el=document.getElementById(elId);if(el)el.remove()}
function getPendingFiles(){return _pendingFiles.filter(f=>f!==null)}
function clearPending(){_pendingFiles=[]}

async function uploadFlashFotos(osId,files,tipo,saidaParcialId){
  const results=[];
  for(const f of files){
    const ext=f.name.split('.').pop()||'jpg';
    const path=`flash/${osId}/${tipo}/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
    const{error}=await sb.storage.from('flash-fotos').upload(path,f,{contentType:f.type});
    if(error){toast('Erro upload: '+error.message,'er');continue}
    const pl={os_id:osId,tipo_foto:tipo,caminho_arquivo:path,nome_arquivo:f.name,tamanho_bytes:f.size,usuario_id:U?.id};
    if(saidaParcialId)pl.saida_parcial_id=saidaParcialId;
    const{error:e2}=await sb.from('flash_fotos').insert(pl);
    if(e2)toast('Erro registro: '+e2.message,'er');else results.push(path);
  }
  return results;
}
async function deleteFlashFoto(fotoId,caminho){await sb.storage.from('flash-fotos').remove([caminho]);await sb.from('flash_fotos').delete().eq('id',fotoId)}

function navCliSearch(e){const res=document.getElementById('oCResults');if(!res||!res.classList.contains('on'))return;const items=[...res.querySelectorAll('.cli-opt[data-idx]')];if(!items.length)return;let idx=items.findIndex(i=>i.classList.contains('on'));if(e.key==='ArrowDown'){e.preventDefault();idx=idx<items.length-1?idx+1:0}else if(e.key==='ArrowUp'){e.preventDefault();idx=idx>0?idx-1:items.length-1}else if(e.key==='Enter'){const active=items[idx>=0?idx:0];if(active){e.preventDefault();const id=active.getAttribute('onclick').match(/selectCli\((\d+)\)/);if(id)selectCli(id[1])}return}else{return}items.forEach(i=>i.classList.remove('on'));items[idx].classList.add('on');items[idx].scrollIntoView({block:'nearest'})}

async function svOS(e){
  e.preventDefault();const b=document.getElementById('bSv');const tipo=document.getElementById('oT').value;
  if(tipo==='flash'){
    if(!document.getElementById('oFCor').value){toast('Selecione a cor do flash','er');return}
    const pesoFlash=parsePesoInput(document.getElementById('oFPeso').value);
    if(!Number.isFinite(pesoFlash)||pesoFlash<=0){toast('Informe um peso válido','er');return}
    if(getPendingFiles().length===0){toast('Adicione pelo menos 1 foto de entrada','er');return}
  }
  b.disabled=true;b.textContent='Salvando...';
  try{
    // Gerar número se flash (garantia contra race condition: regenera no momento do insert)
    let numero=document.getElementById('oN').value.trim();
    if(tipo==='flash'){const{data}=await sb.rpc('proximo_numero_os',{p_prefixo:'FL'});numero=data||numero}
    const pesoFlash=tipo==='flash'?parsePesoInput(document.getElementById('oFPeso').value):null;
    const vol=tipo==='flash'?formatPeso(pesoFlash)+' KG':(document.getElementById('oV').value.trim()||null);
    const clienteId=parseInt(document.getElementById('oCid').value||'0');if(!clienteId){toast('Selecione um cliente válido','er');b.disabled=false;b.textContent='Cadastrar OS';return}const py={numero_os:numero,data_entrada:document.getElementById('oD').value,cliente_id:clienteId,tipo,tem_cataforetico:document.getElementById('oCa')?.checked||false,volume:vol,observacoes:document.getElementById('oO').value.trim()||null,criado_por:U?.id||null};
    const{data:os,error}=await sb.from('ordens_servico').insert(py).select().single();if(error)throw error;
    const{error:e2}=await sb.rpc('gerar_etapas_os',{p_os_id:os.id,p_tipo:os.tipo,p_tem_cataforetico:os.tem_cataforetico,p_data_entrada:os.data_entrada});if(e2)throw e2;
    await sb.from('movimentacoes_os').insert({os_id:os.id,etapa_origem:null,etapa_destino:tipo==='flash'?'flash_em_andamento':'entrada',usuario_id:U?.id||null,observacoes:'OS cadastrada'});
    if(tipo==='flash'){
      await sb.from('flash_controle').insert({os_id:os.id,cor:document.getElementById('oFCor').value,peso_kg:pesoFlash});
      const files=getPendingFiles();
      if(files.length>0)await uploadFlashFotos(os.id,files,'entrada');
      clearPending();
    }
    toast('OS cadastrada!');setTimeout(()=>location.hash='d/'+os.id,500);
  }catch(x){toast(x.message||'Erro','er');b.disabled=false;b.textContent='Cadastrar OS'}
}

// ===== CONTROLE DO FLASH (com saídas parciais e finalização com peso) =====
async function loadFlashCtrl(osId){
  const[r1,r2,r3]=await Promise.all([
    sb.from('flash_controle').select('*').eq('os_id',osId).maybeSingle(),
    sb.from('flash_fotos').select('*').eq('os_id',osId).order('criado_em'),
    sb.from('flash_saidas_parciais').select('*,perfis(nome)').eq('os_id',osId).order('criado_em',{ascending:false})
  ]);
  const ctrl=r1.data;const fotos=r2.data||[];const saidas=r3.data||[];
  const fEnt=fotos.filter(f=>f.tipo_foto==='entrada');
  const fSai=fotos.filter(f=>f.tipo_foto==='saida');
  const cont=document.getElementById('flashCtrlContent');
  const pesoEntrada=ctrl?.peso_kg||0;
  const pesoSaida=ctrl?.peso_saida_total||0;
  const completo=pesoEntrada>0&&pesoSaida>=pesoEntrada;
  const pct=pesoEntrada>0?Math.min(100,(pesoSaida/pesoEntrada)*100):0;
  const emAndamento=_o.status==='em_andamento';
  const canManage=isAdmin()||emAndamento; // ADM sempre; demais só em andamento

  const canFinalize=emAndamento&&pesoSaida>=pesoEntrada&&pesoEntrada>0;

  cont.innerHTML=`
    <div class="fr mb16">
      <div><div class="txs tlt" style="text-transform:uppercase">Cor</div><div class="mt8"><span class="bdg b-${ctrl?.cor||''}" style="font-size:14px">${COR_LBL[ctrl?.cor]||'—'}</span></div></div>
      <div><div class="txs tlt" style="text-transform:uppercase">Peso Entrada</div><div class="mt8" style="font-size:18px;font-weight:600">${formatPeso(pesoEntrada)} KG</div></div>
    </div>
    <div class="peso-box">
      <div class="fx ac jb"><strong>Peso de Saída Acumulado</strong><span style="font-weight:600;color:${completo?'var(--ok)':'var(--wn)'}">${formatPeso(pesoSaida)} / ${formatPeso(pesoEntrada)} KG</span></div>
      <div class="peso-bar"><div class="peso-bar-fill ${completo?'':'incomplete'}" style="width:${pct}%"></div></div>
      <p class="txs tlt">${completo?'✓ Peso completo — pode finalizar':`Faltam ${formatPeso(Math.max(0,pesoEntrada-pesoSaida))} KG para finalizar`}</p>
    </div>
    ${emAndamento?`<div class="fx g8 mb16 fw">
      <button class="btn bok bsm" onclick="abrirSaidaParcial(${osId})">+ Lançar Saída Parcial</button>
      ${canFinalize?`<button class="btn ba bsm" onclick="abrirFinFlash(${osId})">Finalizar Flash</button>`:''}
    </div>`:''}
    ${ctrl?.obs_finalizacao?`<div class="peso-box" style="border-left:4px solid var(--ok)"><strong>Obs. Finalização:</strong><p class="mt8">${ctrl.obs_finalizacao}</p></div>`:''}
    <div class="mb16">
      <div class="fx ac jb"><h4 style="font-size:14px;font-weight:600">Fotos de Entrada (${fEnt.length})</h4>${canManage?`<label class="btn bo bsm cp"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Adicionar<input type="file" accept="image/*" capture="environment" multiple style="display:none" onchange="addMoreFlashFotos(${osId},'entrada',this)"></label>`:''}</div>
      <div class="foto-grid">${fEnt.map(f=>`<div class="foto-thumb"><img src="${STORAGE_URL}${f.caminho_arquivo}" onclick="openLightbox('${STORAGE_URL}${f.caminho_arquivo}')">${canDelete?`<button class="foto-del" onclick="event.stopPropagation();rmFlashFoto(${f.id},'${f.caminho_arquivo}',${osId})">&times;</button>`:''}</div>`).join('')}${fEnt.length===0?'<p class="tlt ts">Nenhuma foto</p>':''}</div>
    </div>
    <div class="mb16">
      <h4 style="font-size:14px;font-weight:600;margin-bottom:8px">Fotos de Saída (${fSai.length})</h4>
      <div class="foto-grid">${fSai.map(f=>`<div class="foto-thumb"><img src="${STORAGE_URL}${f.caminho_arquivo}" onclick="openLightbox('${STORAGE_URL}${f.caminho_arquivo}')">${canDelete?`<button class="foto-del" onclick="event.stopPropagation();rmFlashFoto(${f.id},'${f.caminho_arquivo}',${osId})">&times;</button>`:''}</div>`).join('')}${fSai.length===0?'<p class="tlt ts">Nenhuma foto. Lance saídas parciais para adicionar.</p>':''}</div>
    </div>
    <div>
      <h4 style="font-size:14px;font-weight:600;margin-bottom:8px">Saídas Parciais (${saidas.length})</h4>
      ${saidas.length?saidas.map(s=>`<div class="sp-item"><div class="fx ac jb"><strong>${formatPeso(s.peso_kg)} KG</strong><span class="txs tlt">${fh(s.criado_em)} ${s.perfis?.nome?'— '+s.perfis.nome:''}</span></div>${s.observacao?`<div class="ts mt8">${s.observacao}</div>`:''}${canDelete&&emAndamento?`<button class="btn ber bsm mt8" onclick="rmSaidaParcial(${s.id},${osId})">Excluir saída</button>`:''}</div>`).join(''):'<p class="tlt ts">Nenhuma saída parcial registrada.</p>'}
    </div>`;
}

async function addMoreFlashFotos(osId,tipo,input){
  const files=Array.from(input.files).filter(f=>f.size<=10*1024*1024&&f.type.startsWith('image/'));
  if(files.length===0){toast('Nenhuma imagem válida','er');return}
  toast('Enviando '+files.length+' foto(s)...');
  await uploadFlashFotos(osId,files,tipo);
  toast('Fotos adicionadas!');await loadFlashCtrl(osId);input.value='';
}
async function rmFlashFoto(fotoId,caminho,osId){

  if(!confirm('Remover esta foto?'))return;
  await deleteFlashFoto(fotoId,caminho);toast('Foto removida!');await loadFlashCtrl(osId);
}

// ===== SAÍDAS PARCIAIS =====
function abrirSaidaParcial(osId){
  clearPending();
  document.getElementById('spOsId').value=osId;
  document.getElementById('spPeso').value='';
  document.getElementById('spObs').value='';
  document.getElementById('spFotosPrev').innerHTML='';
  oM('mSaidaP');
}
async function svSaidaParcial(){
  const osId=parseInt(document.getElementById('spOsId').value);
  const peso=parsePesoInput(document.getElementById('spPeso').value);
  const obs=document.getElementById('spObs').value.trim()||null;
  if(!peso||peso<=0){toast('Informe peso válido','er');return}
  const btn=document.getElementById('btnSpSv');btn.disabled=true;btn.textContent='Salvando...';
  try{
    const{data:sp,error}=await sb.from('flash_saidas_parciais').insert({os_id:osId,peso_kg:peso,observacao:obs,usuario_id:U?.id}).select().single();
    if(error)throw error;
    const files=getPendingFiles();
    if(files.length>0)await uploadFlashFotos(osId,files,'saida',sp.id);
    clearPending();
    toast('Saída parcial lançada!');cM('mSaidaP');await loadFlashCtrl(osId);
  }catch(x){toast(x.message||'Erro','er');btn.disabled=false;btn.textContent='Lançar Saída'}
}
async function rmSaidaParcial(spId,osId){
  if(!isAdmin()){toast('Apenas admin','er');return}
  if(!confirm('Excluir esta saída parcial? As fotos vinculadas também serão removidas.'))return;
  // Remover fotos vinculadas
  const{data:fotos}=await sb.from('flash_fotos').select('id,caminho_arquivo').eq('saida_parcial_id',spId);
  for(const f of(fotos||[]))await deleteFlashFoto(f.id,f.caminho_arquivo);
  await sb.from('flash_saidas_parciais').delete().eq('id',spId);
  toast('Saída excluída!');await loadFlashCtrl(osId);
}

// ===== EDIT/DELETE OS (Admin) =====
let _editId=null;
async function openEditOS(id){if(!isAdmin())return;_editId=id;const{data:os}=await sb.from('ordens_servico').select('*').eq('id',id).single();if(!os)return;await loadCliSelect('edCli',os.cliente_id);document.getElementById('edNum').value=os.numero_os||'';document.getElementById('edData').value=os.data_entrada||'';document.getElementById('edTipo').value=os.tipo;document.getElementById('edSt').value=os.status;document.getElementById('edVol').value=os.volume||'';document.getElementById('edCata').checked=os.tem_cataforetico;document.getElementById('edObs').value=os.observacoes||'';oM('mEditOS')}
async function saveEditOS(){if(!isAdmin()||!_editId)return;const py={numero_os:document.getElementById('edNum').value.trim(),data_entrada:document.getElementById('edData').value,cliente_id:parseInt(document.getElementById('edCli').value),tipo:document.getElementById('edTipo').value,status:document.getElementById('edSt').value,tem_cataforetico:document.getElementById('edCata').checked,volume:document.getElementById('edVol').value.trim()||null,observacoes:document.getElementById('edObs').value.trim()||null};const{error}=await sb.from('ordens_servico').update(py).eq('id',_editId);if(error){toast(error.message,'er');return}toast('Atualizada!');cM('mEditOS');const h=location.hash.slice(1);if(h.startsWith('d/'))pgDet(document.getElementById('pg'),_editId);else go(h||'producao')}
async function delOS(id,num){if(!isAdmin())return;if(!confirm(`Excluir OS ${num}? Irreversível.`))return;if(!confirm(`CONFIRMAR?`))return;const{error}=await sb.from('ordens_servico').delete().eq('id',id);if(error){toast(error.message,'er');return}toast('Excluída!');go('producao')}

// ===== ADMIN =====
async function pgA(el){if(!isAdmin()){el.innerHTML='<div class="empty"><h3>Acesso restrito</h3></div>';return}el.innerHTML=`<div class="ph"><div><h2>Administração</h2><p class="phs">Configurações e gestão</p></div></div><div class="tabs"><button class="tb on" onclick="stbA('usr',this)">Usuários</button><button class="tb" onclick="stbA('prz',this)">Prazos</button><button class="tb" onclick="stbA('perm',this)">Permissões</button><button class="tb" onclick="stbA('manut',this)">Manutenção</button></div><div class="tp on" id="tpUsr"><div class="card"><div class="fx ac jb mb16"><h3 style="font-size:16px;font-weight:600">Usuários</h3><button class="btn ba bsm" onclick="oM('mUsr')">+ Novo</button></div><div class="tw"><table><thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Status</th><th>Alterar</th></tr></thead><tbody id="tU"></tbody></table></div></div></div><div class="tp" id="tpPrz"><div class="card"><div class="fx ac jb mb16"><div><h3 style="font-size:16px;font-weight:600">Prazos Padrão</h3><p class="ts tlt mt8">Afeta apenas novas OS</p></div></div><div class="tw"><table><thead><tr><th>Etapa</th><th>Dias</th><th>Tipo</th><th>Cataf.?</th></tr></thead><tbody id="tPz"></tbody></table></div></div></div><div class="tp" id="tpPerm"><div class="card"><h3 style="font-size:16px;font-weight:600;margin-bottom:16px">Permissões por Usuário</h3><div id="permGrid"></div></div></div>
<div class="tp" id="tpManut"><div class="card"><h3 style="font-size:16px;font-weight:600;margin-bottom:16px">Manutenção</h3><div class="peso-box"><h4 style="font-size:14px;font-weight:600">Retenção de Fotos Flash</h4><p class="ts tlt mt8">As fotos do Flash podem ser removidas após 6 meses para liberar storage. Esta ação remove os arquivos físicos e os registros do banco.</p><button class="btn ber mt16" onclick="limparFotosAntigas()">Limpar fotos &gt; 6 meses</button><p class="txs tlt mt8" id="retStatus"></p></div></div></div>`;await Promise.all([ldU(),ldPz(),ldPerm()])}
function stbA(t,b){document.querySelectorAll('.tp').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));document.getElementById('tp'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('on');b.classList.add('on')}
async function ldU(){const{data}=await sb.from('perfis').select('*').order('nome');document.getElementById('tU').innerHTML=(data||[]).map(u=>`<tr><td><strong>${u.nome}</strong></td><td>${u.email}</td><td><span class="be" style="text-transform:capitalize">${u.perfil.replace('_',' ')}</span></td><td><span class="bdg ${u.ativo?'bok2':'ber2'}">${u.ativo?'Ativo':'Inativo'}</span></td><td><select class="fc" style="width:auto;padding:4px 8px;font-size:12px" onchange="upP('${u.id}',this.value)"><option value="producao" ${u.perfil==='producao'?'selected':''}>Produção</option><option value="conferencia" ${u.perfil==='conferencia'?'selected':''}>Conferência</option><option value="expedicao" ${u.perfil==='expedicao'?'selected':''}>Expedição</option><option value="visualizacao" ${u.perfil==='visualizacao'?'selected':''}>Visualização</option><option value="administrador" ${u.perfil==='administrador'?'selected':''}>Administrador</option></select></td></tr>`).join('')}
async function upP(id,p){const{error}=await sb.from('perfis').update({perfil:p}).eq('id',id);error?toast('Erro','er'):toast('Atualizado!')}
async function crUsr(){const n=document.getElementById('uuN').value.trim(),e=document.getElementById('uuE').value.trim(),s=document.getElementById('uuS').value,p=document.getElementById('uuP').value;if(!n||!e||!s){toast('Preencha tudo','er');return}const{error}=await sb.auth.signUp({email:e,password:s,options:{data:{nome:n,perfil:p}}});if(error){toast(error.message,'er');return}toast('Criado!');cM('mUsr');ldU()}
async function ldPz(){const{data}=await sb.from('configuracoes_prazo').select('*').order('aplicavel_a,ordem');document.getElementById('tPz').innerHTML=(data||[]).map(c=>`<tr><td><strong>${le(c.etapa_nome)}</strong></td><td><input type="number" class="fc" style="width:80px;display:inline" value="${c.prazo_dias}" min="0" onchange="upPz(${c.id},this.value)"></td><td><span class="bt ${c.aplicavel_a==='flash'?'bfl':'bf'}">${c.aplicavel_a==='flash'?'Flash':'Folheação'}</span></td><td>${c.requer_cataforetico?'Sim':'Não'}</td></tr>`).join('')}
async function upPz(id,d){const{error}=await sb.from('configuracoes_prazo').update({prazo_dias:parseInt(d)}).eq('id',id);error?toast('Erro','er'):toast('Atualizado!')}
async function ldPerm(){const{data:users}=await sb.from('perfis').select('id,nome').order('nome');const{data:perms}=await sb.from('permissoes_etapa').select('*');const ap=perms||[];let h='<div class="tw"><table><thead><tr><th>Usuário</th>';ET.forEach(e=>h+=`<th class="tc">${le(e)}</th>`);h+='</tr></thead><tbody>';(users||[]).forEach(u=>{h+=`<tr><td><strong>${u.nome}</strong></td>`;ET.forEach(e=>{const has=ap.some(p=>p.usuario_id===u.id&&p.etapa_nome===e&&p.pode_editar);h+=`<td class="tc"><input type="checkbox" ${has?'checked':''} onchange="tgPerm('${u.id}','${e}',this.checked)"></td>`});h+='</tr>'});h+='</tbody></table></div>';document.getElementById('permGrid').innerHTML=h}
async function tgPerm(uid,etapa,checked){if(checked){await sb.from('permissoes_etapa').upsert({usuario_id:uid,etapa_nome:etapa,pode_editar:true},{onConflict:'usuario_id,etapa_nome'})}else{await sb.from('permissoes_etapa').delete().eq('usuario_id',uid).eq('etapa_nome',etapa)}const{data}=await sb.from('permissoes_etapa').select('*');PERMS=data||[];toast('Atualizado!')}

// ===== RETENÇÃO 6 MESES =====
async function limparFotosAntigas(){
  if(!isAdmin())return;
  if(!confirm('Remover todas as fotos Flash com mais de 6 meses? Esta ação é irreversível.'))return;
  const status=document.getElementById('retStatus');status.textContent='Listando fotos antigas...';
  const{data,error}=await sb.rpc('listar_fotos_antigas_flash');
  if(error){toast(error.message,'er');return}
  const lista=data||[];
  if(lista.length===0){toast('Nenhuma foto para remover');status.textContent='Nenhuma foto antiga encontrada.';return}
  status.textContent=`Encontradas ${lista.length} fotos. Removendo...`;
  let ok=0,err=0;
  // Remover do storage em lotes
  for(let i=0;i<lista.length;i+=50){
    const batch=lista.slice(i,i+50);
    const paths=batch.map(f=>f.caminho_arquivo);
    const{error:eSt}=await sb.storage.from('flash-fotos').remove(paths);
    if(eSt)console.error('storage remove error',eSt);
    // Remover registros
    const ids=batch.map(f=>f.id);
    const{error:eDb}=await sb.from('flash_fotos').delete().in('id',ids);
    if(eDb){err+=batch.length}else{ok+=batch.length}
    status.textContent=`Removidas ${ok}/${lista.length}...`;
  }
  status.textContent=`Concluído: ${ok} removidas, ${err} erros.`;
  toast(`${ok} fotos removidas`);
}

init();
