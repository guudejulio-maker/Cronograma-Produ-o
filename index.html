<style>
:root{--pri:#1B2A4A;--pri-l:#2D4A7A;--pri-d:#0F1B33;--acc:#D4A853;--acc-l:#E8C97A;--bg:#F4F1EC;--bgc:#FFF;--bgs:#1B2A4A;--tx:#1A1A1A;--txl:#6B7280;--txm:#9CA3AF;--brd:#E5E1DA;--ok:#059669;--okb:#D1FAE5;--okt:#065F46;--wn:#D97706;--wnb:#FEF3C7;--wnt:#92400E;--er:#DC2626;--erb:#FEE2E2;--ert:#991B1B;--or:#EA580C;--orb:#FED7AA;--ort:#9A3412;--inf:#2563EB;--infb:#DBEAFE;--inft:#1E40AF;--r:10px;--rl:14px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);line-height:1.5;min-height:100vh}a{color:inherit;text-decoration:none}
.app{display:flex;min-height:100vh}.side{width:260px;background:var(--bgs);color:#fff;padding:24px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .2s}
.side-logo{padding:0 24px 24px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:16px}.side-logo h1{font-size:18px;font-weight:600;color:var(--acc)}.side-logo span{font-size:12px;color:rgba(255,255,255,.5);display:block;margin-top:2px}

.snav a:hover,.snav a.on{background:rgba(255,255,255,.1);color:#fff}.snav a.on{background:rgba(212,168,83,.15);color:var(--acc);font-weight:500}.snav a svg{width:20px;height:20px;flex-shrink:0;opacity:.7}.snav a.on svg{opacity:1}
.su{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:12px}.su-av{width:36px;height:36px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:var(--pri-d)}
.su-i{flex:1;min-width:0}.su-i .n{font-size:13px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.su-i .p{font-size:11px;color:rgba(255,255,255,.5);text-transform:capitalize}
.bout{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;padding:4px;transition:color .2s}.bout:hover{color:var(--er)}

.st{background:var(--bgc);border-radius:var(--rl);border:1px solid var(--brd);padding:20px;box-shadow:0 1px 2px rgba(0,0,0,.05);transition:all .2s}.st:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);transform:translateY(-1px)}
.sti{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px}.stv{font-size:30px;font-weight:700;letter-spacing:-1px;line-height:1}.stl{font-size:13px;color:var(--txl);margin-top:4px}
.st1 .sti{background:var(--okb);color:var(--ok)}.st1 .stv{color:var(--ok)}.st2 .sti{background:var(--wnb);color:var(--wn)}.st2 .stv{color:var(--wn)}.st3 .sti{background:var(--erb);color:var(--er)}.st3 .stv{color:var(--er)}.st4 .sti{background:var(--infb);color:var(--inf)}.st4 .stv{color:var(--inf)}.st5 .sti{background:#F3F4F6;color:var(--txl)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:500;border:none;cursor:pointer;transition:all .2s;white-space:nowrap}
.bp{background:var(--pri);color:#fff}.bp:hover{background:var(--pri-l)}.ba{background:var(--acc);color:var(--pri-d)}.ba:hover{background:var(--acc-l)}.bok{background:var(--ok);color:#fff}.bok:hover{opacity:.9}.ber{background:var(--er);color:#fff}.ber:hover{opacity:.85}.bo{background:transparent;border:1px solid var(--brd);color:var(--tx)}.bo:hover{background:var(--bg)}
.bsm{padding:6px 14px;font-size:13px}.blg{padding:14px 28px;font-size:16px}.bbl{width:100%;justify-content:center}.btn:disabled{opacity:.5;cursor:not-allowed}
.fg{margin-bottom:18px}.fg label{display:block;font-size:13px;font-weight:500;color:var(--tx);margin-bottom:6px}
.fc{width:100%;padding:10px 14px;border:1px solid var(--brd);border-radius:8px;font-family:inherit;font-size:14px;color:var(--tx);background:#fff;transition:border-color .2s}.fc:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(27,42,74,.1)}
select.fc{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%236B7280' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:36px}
textarea.fc{resize:vertical;min-height:80px}.fr{display:grid;grid-template-columns:1fr 1fr;gap:16px}.fchk{display:flex;align-items:center;gap:10px}.fchk input[type="checkbox"]{width:20px;height:20px;accent-color:var(--pri);cursor:pointer}.fchk label{margin:0;cursor:pointer;font-size:14px}
.tw{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--brd);background:var(--bgc)}table{width:100%;border-collapse:collapse;font-size:14px}thead th{background:var(--bg);padding:12px 16px;text-align:left;font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--txl);white-space:nowrap;border-bottom:1px solid var(--brd)}
tbody td{padding:14px 16px;border-bottom:1px solid var(--brd);vertical-align:middle}tbody tr:last-child td{border-bottom:none}tbody tr:hover{background:rgba(27,42,74,.02)}tr.re{background:rgba(220,38,38,.04)}tr.rw{background:rgba(217,119,6,.04)}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap}.bok2{background:var(--okb);color:var(--okt)}.bwn{background:var(--wnb);color:var(--wnt)}.bor{background:var(--orb);color:var(--ort)}.ber2{background:var(--erb);color:var(--ert)}
.bt{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}.bf{background:#EDE9FE;color:#5B21B6}.bfl{background:#FEF3C7;color:#92400E}.be{background:var(--infb);color:var(--inft);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}.bc{background:#EDE9FE;color:#5B21B6;font-size:10px;padding:2px 8px;border-radius:10px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:20px}.modal.on{display:flex}.mc{background:var(--bgc);border-radius:var(--rl);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.12)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--brd)}.mh h3{font-size:18px;font-weight:600}.mx{background:none;border:none;font-size:24px;color:var(--txl);cursor:pointer;padding:4px;line-height:1}.mb{padding:24px}.mf{padding:16px 24px;border-top:1px solid var(--brd);display:flex;justify-content:flex-end;gap:10px}
.kb{display:flex;gap:12px;overflow-x:auto;padding-bottom:16px}.kc{min-width:220px;max-width:280px;flex-shrink:0;background:var(--bg);border-radius:var(--rl);border:1px solid var(--brd)}.kh{padding:14px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}.kh h4{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}.kcn{background:var(--pri);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}.kby{padding:10px;display:flex;flex-direction:column;gap:8px;max-height:65vh;overflow-y:auto}
.kcd{background:var(--bgc);border-radius:8px;padding:12px;border:1px solid var(--brd);cursor:pointer;transition:all .2s}.kcd:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);transform:translateY(-1px)}
.fil{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}.fil .fc{width:auto;min-width:160px}.fil input[type="search"]{min-width:220px}
.tl{position:relative;padding-left:28px}.tl::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:var(--brd)}.ti{position:relative;padding-bottom:20px}.ti::before{content:'';position:absolute;left:-24px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--pri);border:2px solid var(--bgc)}.td{font-size:12px;color:var(--txm)}.tt{font-size:14px;margin-top:2px}
.toast{position:fixed;bottom:24px;right:24px;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:500;color:#fff;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s}.toast.show{transform:translateY(0);opacity:1}.tok{background:var(--ok)}.ter{background:var(--er)}
.spin{width:36px;height:36px;border:3px solid var(--brd);border-top-color:var(--pri);border-radius:50%;animation:sp .6s linear infinite;margin:40px auto}@keyframes sp{to{transform:rotate(360deg)}}
.ep{display:flex;align-items:center;gap:0;overflow-x:auto;padding:20px 0}.epi{display:flex;flex-direction:column;align-items:center}.epc{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;border:2px solid var(--brd);background:#fff;color:var(--txl)}
.epc.dn{background:var(--ok);border-color:var(--ok);color:#fff}.epc.cr{background:var(--inf);border-color:var(--inf);color:#fff;animation:pu 2s infinite}.epc.pd{background:#F3F4F6}@keyframes pu{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.3)}50%{box-shadow:0 0 0 8px rgba(37,99,235,0)}}
.epl{width:32px;height:2px;background:var(--brd);flex-shrink:0}.epl.dn{background:var(--ok)}.epn{font-size:11px;text-align:center;margin-top:6px;color:var(--txl);max-width:72px}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--brd);margin-bottom:24px;overflow-x:auto}.tb{padding:10px 20px;font-family:inherit;font-size:14px;font-weight:500;color:var(--txl);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;white-space:nowrap;transition:all .2s}.tb.on{color:var(--pri);border-bottom-color:var(--pri)}.tp{display:none}.tp.on{display:block}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--pri-d) 0%,var(--pri) 50%,var(--pri-l) 100%);padding:20px}
.lb{background:var(--bgc);border-radius:var(--rl);padding:48px 40px;width:100%;max-width:420px;box-shadow:0 8px 30px rgba(0,0,0,.12)}.lb h1{font-size:24px;font-weight:700;color:var(--pri-d);margin-bottom:4px;text-align:center}.lb .sub{text-align:center;color:var(--txl);font-size:14px;margin-bottom:32px}.lb .logo{text-align:center;font-size:13px;color:var(--acc);font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}.lerr{background:var(--erb);color:var(--ert);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.empty{text-align:center;padding:60px 20px;color:var(--txl)}.empty h3{font-size:18px;font-weight:500;margin-bottom:6px;color:var(--tx)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.fx{display:flex}.ac{align-items:center}.jb{justify-content:space-between}.g8{gap:8px}.g16{gap:16px}.mt8{margin-top:8px}.mt16{margin-top:16px}.mt24{margin-top:24px}.mb16{margin-bottom:16px}.mb24{margin-bottom:24px}.tc{text-align:center}.txs{font-size:12px}.ts{font-size:13px}.tlt{color:var(--txl)}.trn{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.cp{cursor:pointer}
.obs-item{padding:10px 0;border-bottom:1px solid var(--brd)}.obs-item:last-child{border:none}.obs-meta{font-size:11px;color:var(--txm)}.obs-text{font-size:14px;margin-top:4px}
@media(max-width:768px){.side{transform:translateX(-100%)}.side.open{transform:translateX(0)}.sov.on{display:block}.mtog{display:flex}.mn{margin-left:0;padding:72px 16px 20px}.ph{flex-direction:column;align-items:flex-start}.fr{grid-template-columns:1fr}.fil{flex-direction:column;align-items:stretch}.fil .fc{width:100%;min-width:auto}.stats{grid-template-columns:repeat(2,1fr);gap:10px}.st{padding:14px}.stv{font-size:24px}.g2{grid-template-columns:1fr}.lb{padding:32px 24px}.kc{min-width:260px}}
</style>
</head>
<body>
<div id="vLogin" style="display:none"><div class="lw"><div class="lb"><div class="logo">Scarlat Galvânica</div><h1>Cronograma de Produção</h1><p class="sub">Entre com suas credenciais</p><div class="lerr" id="lErr"></div><form onsubmit="doLogin(event)"><div class="fg"><label>E-mail</label><input type="email" id="iEm" class="fc" placeholder="seu@email.com" required></div><div class="fg"><label>Senha</label><input type="password" id="iPw" class="fc" placeholder="Sua senha" required></div><button type="submit" class="btn bp blg bbl mt16" id="bLog">Entrar</button></form></div></div></div>
<div id="vApp" style="display:none"><button class="mtog" onclick="tgM()">&#9776;</button><div class="sov" id="sOv" onclick="tgM()"></div><div class="app"><aside class="side" id="sBar"><div class="side-logo"><h1>Cronograma</h1><span>Scarlat Galvânica</span></div><nav class="snav" id="sNav"></nav><div class="su"><div class="su-av" id="uA">?</div><div class="su-i"><div class="n" id="uN">...</div><div class="p" id="uP">—</div></div><button class="bout" onclick="doOut()" title="Sair"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button></div></aside><main class="mn" id="pg"></main></div></div>

<!-- MODALS -->
<div class="modal" id="mCli"><div class="mc" style="max-width:450px"><div class="mh"><h3>Novo Cliente</h3><button class="mx" onclick="cM('mCli')">&times;</button></div><div class="mb"><div class="fg"><label>Nome *</label><input type="text" id="cN" class="fc"></div><div class="fg"><label>Telefone</label><input type="text" id="cT" class="fc"></div><div class="fg"><label>E-mail</label><input type="email" id="cE" class="fc"></div></div><div class="mf"><button class="btn bo" onclick="cM('mCli')">Cancelar</button><button class="btn bp" onclick="svCli()">Salvar</button></div></div></div>
<div class="modal" id="mPrz"><div class="mc" style="max-width:450px"><div class="mh"><h3>Alterar Prazo</h3><button class="mx" onclick="cM('mPrz')">&times;</button></div><div class="mb"><input type="hidden" id="pEid"><div class="fg"><label>Nova Data</label><input type="date" id="pDt" class="fc"></div><div class="fg"><label>Justificativa *</label><textarea id="pJt" class="fc" placeholder="Motivo da alteração..."></textarea></div></div><div class="mf"><button class="btn bo" onclick="cM('mPrz')">Cancelar</button><button class="btn bp" onclick="svPrz()">Confirmar</button></div></div></div>
<div class="modal" id="mUsr"><div class="mc" style="max-width:480px"><div class="mh"><h3>Novo Usuário</h3><button class="mx" onclick="cM('mUsr')">&times;</button></div><div class="mb"><div class="fg"><label>Nome *</label><input type="text" id="uuN" class="fc"></div><div class="fg"><label>E-mail *</label><input type="email" id="uuE" class="fc"></div><div class="fg"><label>Senha *</label><input type="password" id="uuS" class="fc" minlength="6"></div><div class="fg"><label>Perfil</label><select id="uuP" class="fc"><option value="producao">Produção</option><option value="conferencia">Conferência</option><option value="expedicao">Expedição</option><option value="visualizacao">Visualização</option><option value="administrador">Administrador</option></select></div></div><div class="mf"><button class="btn bo" onclick="cM('mUsr')">Cancelar</button><button class="btn bp" onclick="crUsr()">Criar</button></div></div></div>
<!-- Modal Editar OS (Admin) -->
<div class="modal" id="mEditOS"><div class="mc" style="max-width:600px"><div class="mh"><h3>Editar OS</h3><button class="mx" onclick="cM('mEditOS')">&times;</button></div><div class="mb">
<div class="fr"><div class="fg"><label>Número da OS</label><input type="text" id="edNum" class="fc"></div><div class="fg"><label>Data de Entrada</label><input type="date" id="edData" class="fc"></div></div>
<div class="fg"><label>Cliente</label><select id="edCli" class="fc"></select></div>
<div class="fr"><div class="fg"><label>Tipo</label><select id="edTipo" class="fc"><option value="folheacao">Folheação</option><option value="flash">Flash</option></select></div><div class="fg"><label>Status</label><select id="edSt" class="fc"><option value="em_andamento">Em andamento</option><option value="finalizada">Finalizada</option><option value="cancelada">Cancelada</option><option value="postada">Postada</option></select></div></div>
<div class="fr"><div class="fg"><label>Peso (KG)</label><input type="text" id="edVol" class="fc" placeholder="Ex: 12.5 KG"></div><div class="fg"><label>Cataforético</label><div class="fchk mt8"><input type="checkbox" id="edCata"><label for="edCata">Sim</label></div></div></div>
<div class="fg"><label>Observações</label><textarea id="edObs" class="fc"></textarea></div>
</div><div class="mf"><button class="btn bo" onclick="cM('mEditOS')">Cancelar</button><button class="btn bp" onclick="saveEditOS()">Salvar</button></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SU='https://zhxhmgwfbxnxbptixskv.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoeGhtZ3dmYnhueGJwdGl4c2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMTQwMTksImV4cCI6MjA5MTc5MDAxOX0.R8DYrcknP7QVMBvVZtc9jr-yWJZo1iACFBRA2YzLwTo';
const sb=window.supabase.createClient(SU,SK);
const ET=['entrada','foto','catalogacao','amarracao','banho','cataforetico','corte','conferencia','postagem'];
const EL={entrada:'Entrada',foto:'Foto',catalogacao:'Catalogação',amarracao:'Amarração',banho:'Banho',cataforetico:'Cataforético',corte:'Corte',conferencia:'Conferência',postagem:'Postagem',flash_em_andamento:'Flash',finalizado:'Finalizado'};
const SL={em_andamento:'Em Andamento',finalizada:'Finalizada',cancelada:'Cancelada',postada:'Postada'};
let U=null,UP=null,CP=[],PERMS=[];
function le(e){return EL[e]||e}function ls(s){return SL[s]||s}
function fd(d){if(!d)return'—';return new Date(d+(d.includes('T')?'':'T00:00:00')).toLocaleDateString('pt-BR')}
function fh(d){if(!d)return'—';return new Date(d).toLocaleString('pt-BR')}
function al(d){if(!d)return'no_prazo';const h=new Date;h.setHours(0,0,0,0);const p=new Date(d+'T00:00:00'),df=Math.floor((p-h)/864e5);return df<0?'vencido':df===0?'vence_hoje':df===1?'vence_amanha':'no_prazo'}
function ac(a){return a==='vencido'?'ber2':a==='vence_hoje'?'bor':a==='vence_amanha'?'bwn':'bok2'}
function at(a){return a==='vencido'?'Vencido':a==='vence_hoje'?'Vence hoje':a==='vence_amanha'?'Vence amanhã':'No prazo'}
function ba(d){const a=al(d);return`<span class="bdg ${ac(a)}">${at(a)}</span>`}
function toast(m,t='ok'){const e=document.createElement('div');e.className=`toast t${t}`;e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.classList.add('show'),10);setTimeout(()=>{e.classList.remove('show');setTimeout(()=>e.remove(),300)},3e3)}
function oM(id){document.getElementById(id).classList.add('on')}function cM(id){document.getElementById(id).classList.remove('on')}
function tgM(){document.getElementById('sBar').classList.toggle('open');document.getElementById('sOv').classList.toggle('on')}function hj(){return new Date().toISOString().split('T')[0]}
function podeEditar(etapa){if(!U)return false;if(UP&&UP.perfil==='administrador')return true;return PERMS.some(p=>p.usuario_id===U.id&&p.etapa_nome===etapa&&p.pode_editar)}

  const canPost=os.status==='finalizada'&&(isAdmin()||podeEditar('postagem'));
  const bA=canAdv?`<button class="btn bok" onclick="avE(${os.id})">Avançar Etapa</button>`:'';
  const bFn=canFinF?`<button class="btn bp" onclick="fnOS(${os.id})">Finalizar</button>`:'';
  const bPo=canPost?`<button class="btn ba" onclick="poOS(${os.id})">Marcar Postado</button>`:'';
  const bEd=isAdmin()?`<button class="btn bo" onclick="openEditOS(${os.id})">Editar OS</button>`:'';
  const bDel=isAdmin()?`<button class="btn ber" onclick="delOS(${os.id},'${os.numero_os}')">Excluir OS</button>`:'';
  el.innerHTML=`<div class="ph"><div><h2>OS ${os.numero_os}</h2><p class="phs">${os.clientes?.nome||''} — ${iF?'Folheação':'Flash'}</p></div><div class="fx g8" style="flex-wrap:wrap">${bA}${bFn}${bPo}${bEd}${bDel}<button class="btn bo" onclick="go('producao')">Voltar</button></div></div>
  <div class="card mb24"><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:20px">
  <div><div class="txs tlt" style="text-transform:uppercase;letter-spacing:.5px">OS</div><div style="font-size:18px;font-weight:600">${os.numero_os}</div></div>
  <div><div class="txs tlt" style="text-transform:uppercase;letter-spacing:.5px">Cliente</div><div style="font-size:16px;font-weight:500">${os.clientes?.nome||'—'}</div></div>
  <div><div class="txs tlt" style="text-transform:uppercase;letter-spacing:.5px">Tipo</div><div><span class="bt ${os.tipo==='flash'?'bfl':'bf'}">${iF?'Folheação':'Flash'}</span>${os.tem_cataforetico?' <span class="bc">Cataf.</span>':''}</div></div>
  <div><div class="txs tlt" style="text-transform:uppercase;letter-spacing:.5px">Etapa</div><div><span class="be">${le(os.etapa_atual)}</span></div></div>
  <div><div class="txs tlt" style="text-transform:uppercase;letter-spacing:.5px">Peso (KG)</div><div>${os.volume||'—'}</div></div>
  <div><div class="txs tlt" style="text-transform:uppercase;letter-spacing:.5px">Entrada</div><div>${fd(os.data_entrada)}</div></div>
  <div><div class="txs tlt" style="text-transform:uppercase;letter-spacing:.5px">Prev. Conclusão</div><div>${fd(os.data_prevista_conclusao)} ${ba(os.data_prevista_conclusao)}</div></div>
  <div><div class="txs tlt" style="text-transform:uppercase;letter-spacing:.5px">Status</div><div><span class="bdg ${os.status==='em_andamento'?'bok2':os.status==='finalizada'?'bor':'ber2'}">${ls(os.status)}</span></div></div>
  ${os.observacoes?`<div style="grid-column:1/-1"><div class="txs tlt" style="text-transform:uppercase;letter-spacing:.5px">Obs</div><div class="mt8">${os.observacoes}</div></div>`:''}
  </div></div>
  ${iF?`<div class="card mb24"><h3 style="font-size:16px;font-weight:600;margin-bottom:12px">Progresso</h3><div class="ep" id="oEP"></div><div class="tw mt16"><table><thead><tr><th>Etapa</th><th>Status</th><th>Entr.Prev.</th><th>Saída Prev.</th><th>Entr.Real</th><th>Saída Real</th><th>Ação</th></tr></thead><tbody id="oET"></tbody></table></div></div>`:''}
  ${iF?'<div class="card mb24" id="obsConfArea" style="display:none"><h3 style="font-size:16px;font-weight:600;margin-bottom:12px">Observações da Conferência</h3><div id="obsConfForm"></div><div id="obsConfList"></div></div>':''}
  <div class="card"><div class="tabs"><button class="tb on" onclick="stb('mov',this)">Movimentações</button><button class="tb" onclick="stb('prz',this)">Alterações Prazo</button></div>
  <div class="tp on" id="tpMov"><div id="lM"><div class="spin"></div></div></div>
  <div class="tp" id="tpPrz"><div id="lP"><div class="spin"></div></div></div></div>`;
  if(iF){await ldEt(id);await ldObsConf(id)}await Promise.all([ldMv(id),ldHP(id)])}

async function ldEt(id){const{data}=await sb.from('etapas_os').select('*').eq('os_id',id).order('ordem');_e=data||[];document.getElementById('oEP').innerHTML=_e.map((e,i)=>{const s=e.status==='concluida'?'dn':e.status==='em_andamento'?'cr':'pd';return`<div class="epi"><div class="epc ${s}">${e.status==='concluida'?'&#10003;':(i+1)}</div><div class="epn">${le(e.etapa_nome)}</div></div>${i<_e.length-1?`<div class="epl ${e.status==='concluida'?'dn':''}"></div>`:''}`}).join('');document.getElementById('oET').innerHTML=_e.map(e=>{const ce=podeEditar(e.etapa_nome);return`<tr><td><strong>${le(e.etapa_nome)}</strong></td><td><span class="bdg ${e.status==='concluida'?'bok2':e.status==='em_andamento'?'bor':''}">${e.status==='concluida'?'Concluída':e.status==='em_andamento'?'Em andamento':'Pendente'}</span></td><td>${fd(e.data_entrada_prevista)}</td><td>${fd(e.data_saida_prevista)} ${e.status!=='concluida'?ba(e.data_saida_prevista):''}</td><td>${e.data_entrada_real?fh(e.data_entrada_real):'—'}</td><td>${e.data_saida_real?fh(e.data_saida_real):'—'}</td><td>${e.status!=='concluida'&&ce?`<button class="btn bo bsm" onclick="aPrz(${e.id},'${e.data_saida_prevista||''}')">Alterar</button>`:e.status!=='concluida'&&!ce?'<span class="txs tlt">Sem permissão</span>':''}</td></tr>`}).join('')}

async function ldObsConf(osId){const etConf=_e.find(e=>e.etapa_nome==='conferencia');if(!etConf)return;const area=document.getElementById('obsConfArea');area.style.display='block';const canObs=podeEditar('conferencia');document.getElementById('obsConfForm').innerHTML=canObs?`<div class="fx g8 mb16" style="flex-wrap:wrap"><textarea id="novaObsConf" class="fc" placeholder="Adicionar observação da conferência..." style="min-height:60px;flex:1"></textarea><button class="btn bp" onclick="svObsConf(${osId})" style="align-self:flex-end">Salvar</button></div>`:'';const{data}=await sb.from('observacoes_conferencia').select('*,perfis(nome)').eq('os_id',osId).order('criado_em',{ascending:false});document.getElementById('obsConfList').innerHTML=data?.length?data.map(o=>`<div class="obs-item"><div class="obs-meta">${fh(o.criado_em)} ${o.perfis?.nome?'— '+o.perfis.nome:''}</div><div class="obs-text">${o.observacao}</div></div>`).join(''):'<p class="tlt ts">Nenhuma observação.</p>'}
async function svObsConf(osId){const t=document.getElementById('novaObsConf')?.value?.trim();if(!t){toast('Escreva a observação','er');return}const{error}=await sb.from('observacoes_conferencia').insert({os_id:osId,observacao:t,usuario_id:U?.id});if(error){toast(error.message,'er');return}toast('Observação salva!');await ldObsConf(osId)}

async function ldMv(id){const{data}=await sb.from('movimentacoes_os').select('*,perfis(nome)').eq('os_id',id).order('data_movimentacao',{ascending:false});document.getElementById('lM').innerHTML=data?.length?`<div class="tl">${data.map(m=>`<div class="ti"><div class="td">${fh(m.data_movimentacao)} ${m.perfis?.nome?'— '+m.perfis.nome:''}</div><div class="tt">${m.etapa_origem?`<span class="be">${le(m.etapa_origem)}</span> → `:''}<span class="be">${le(m.etapa_destino)}</span>${m.observacoes?`<br><span class="ts tlt">${m.observacoes}</span>`:''}</div></div>`).join('')}</div>`:'<p class="tlt">Nenhuma movimentação.</p>'}
async function ldHP(id){const{data}=await sb.from('historico_prazo').select('*,perfis(nome)').eq('os_id',id).order('criado_em',{ascending:false});document.getElementById('lP').innerHTML=data?.length?`<div class="tl">${data.map(h=>`<div class="ti"><div class="td">${fh(h.criado_em)} ${h.perfis?.nome?'— '+h.perfis.nome:''}</div><div class="tt"><strong>${le(h.etapa_nome)}</strong>: ${fd(h.prazo_anterior)} → ${fd(h.novo_prazo)}<br><span class="ts tlt">Justificativa: ${h.justificativa}</span></div></div>`).join('')}</div>`:'<p class="tlt">Nenhuma alteração.</p>'}
function stb(t,btn){document.querySelectorAll('.tp').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));document.getElementById('tp'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('on');btn.classList.add('on')}

async function avE(id){if(!podeEditar(_o.etapa_atual)){toast('Sem permissão','er');return}if(!confirm('Avançar etapa?'))return;const{data,error}=await sb.rpc('mover_os_proxima_etapa',{p_os_id:id,p_usuario_id:U?.id||null,p_observacoes:null});if(error){toast(error.message,'er');return}const r=typeof data==='string'?JSON.parse(data):data;if(!r.success){toast(r.error,'er');return}toast(r.message);pgDet(document.getElementById('pg'),id)}
async function fnOS(id){if(!confirm('Finalizar?'))return;await sb.from('ordens_servico').update({status:'finalizada',etapa_atual:'finalizado',data_conclusao:new Date().toISOString()}).eq('id',id);await sb.from('movimentacoes_os').insert({os_id:id,etapa_origem:_o.etapa_atual,etapa_destino:'finalizado',usuario_id:U?.id});toast('Finalizada!');pgDet(document.getElementById('pg'),id)}
async function poOS(id){if(!confirm('Marcar como postado?'))return;await sb.from('ordens_servico').update({status:'postada',data_postagem:new Date().toISOString()}).eq('id',id);toast('Postado!');pgDet(document.getElementById('pg'),id)}
function aPrz(eid,d){document.getElementById('pEid').value=eid;document.getElementById('pDt').value=d;document.getElementById('pJt').value='';oM('mPrz')}
async function svPrz(){const eid=parseInt(document.getElementById('pEid').value),nd=document.getElementById('pDt').value,j=document.getElementById('pJt').value.trim();if(!nd||!j){toast('Preencha tudo','er');return}const{error}=await sb.rpc('alterar_prazo_etapa',{p_etapa_id:eid,p_novo_prazo:nd,p_justificativa:j,p_usuario_id:U?.id||null});if(error){toast(error.message,'er');return}toast('Prazo alterado!');cM('mPrz');const id=location.hash.split('/')[1];pgDet(document.getElementById('pg'),id)}

// ===== EDITAR OS (Admin) =====
let _editId=null;
async function openEditOS(id){
  if(!isAdmin()){toast('Sem permissão','er');return}
  _editId=id;
  const{data:os}=await sb.from('ordens_servico').select('*').eq('id',id).single();
  if(!os)return;
  // Carregar clientes no select
  const{data:cls}=await sb.from('clientes').select('id,nome').eq('ativo',true).order('nome');
  const sel=document.getElementById('edCli');sel.innerHTML='';(cls||[]).forEach(c=>sel.innerHTML+=`<option value="${c.id}" ${c.id===os.cliente_id?'selected':''}>${c.nome}</option>`);
  document.getElementById('edNum').value=os.numero_os||'';
  document.getElementById('edData').value=os.data_entrada||'';
  document.getElementById('edTipo').value=os.tipo;
  document.getElementById('edSt').value=os.status;
  document.getElementById('edVol').value=os.volume||'';
  document.getElementById('edCata').checked=os.tem_cataforetico;
  document.getElementById('edObs').value=os.observacoes||'';
  oM('mEditOS');
}
async function saveEditOS(){
  if(!isAdmin()||!_editId){toast('Sem permissão','er');return}
  const py={numero_os:document.getElementById('edNum').value.trim(),data_entrada:document.getElementById('edData').value,cliente_id:parseInt(document.getElementById('edCli').value),tipo:document.getElementById('edTipo').value,status:document.getElementById('edSt').value,tem_cataforetico:document.getElementById('edCata').checked,volume:document.getElementById('edVol').value.trim()||null,observacoes:document.getElementById('edObs').value.trim()||null};
  const{error}=await sb.from('ordens_servico').update(py).eq('id',_editId);
  if(error){toast(error.message,'er');return}
  toast('OS atualizada!');cM('mEditOS');
  // Refresh current page
  const h=location.hash.slice(1);
  if(h.startsWith('d/'))pgDet(document.getElementById('pg'),_editId);
  else if(h==='producao')pgP(document.getElementById('pg'));
  else go(h||'dashboard');
}

// ===== EXCLUIR OS (Admin) =====
async function delOS(id,num){
  if(!isAdmin()){toast('Sem permissão','er');return}
  if(!confirm(`Tem certeza que deseja EXCLUIR a OS ${num}?\n\nEsta ação é irreversível e apagará todos os dados, etapas, movimentações e histórico desta OS.`))return;
  if(!confirm(`CONFIRMAR EXCLUSÃO da OS ${num}?`))return;
  // Delete em cascata (as FKs já tem ON DELETE CASCADE)
  const{error}=await sb.from('ordens_servico').delete().eq('id',id);
  if(error){toast('Erro: '+error.message,'er');return}
  toast('OS excluída!');go('producao');
}

// ===== ADMIN =====
async function pgA(el){if(!isAdmin()){el.innerHTML='<div class="empty"><h3>Acesso restrito</h3><p>Apenas administradores.</p></div>';return}el.innerHTML=`<div class="ph"><div><h2>Administração</h2><p class="phs">Configurações e gestão</p></div></div><div class="tabs"><button class="tb on" onclick="stbA('usr',this)">Usuários</button><button class="tb" onclick="stbA('prz',this)">Prazos</button><button class="tb" onclick="stbA('cli',this)">Clientes</button><button class="tb" onclick="stbA('perm',this)">Permissões</button></div><div class="tp on" id="tpUsr"><div class="card"><div class="fx ac jb mb16"><h3 style="font-size:16px;font-weight:600">Usuários</h3><button class="btn ba bsm" onclick="oM('mUsr')">+ Novo</button></div><div class="tw"><table><thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Status</th><th>Alterar</th></tr></thead><tbody id="tU"></tbody></table></div></div></div><div class="tp" id="tpPrz"><div class="card"><div class="fx ac jb mb16"><div><h3 style="font-size:16px;font-weight:600">Prazos Padrão</h3><p class="ts tlt mt8">Afeta apenas novas OS</p></div></div><div class="tw"><table><thead><tr><th>Etapa</th><th>Dias</th><th>Tipo</th><th>Cataf.?</th></tr></thead><tbody id="tPz"></tbody></table></div></div></div><div class="tp" id="tpCli"><div class="card"><div class="fx ac jb mb16"><h3 style="font-size:16px;font-weight:600">Clientes</h3><button class="btn ba bsm" onclick="oM('mCli')">+ Novo</button></div><div class="tw"><table><thead><tr><th>Nome</th><th>Telefone</th><th>E-mail</th><th>Status</th></tr></thead><tbody id="tCl"></tbody></table></div></div></div><div class="tp" id="tpPerm"><div class="card"><h3 style="font-size:16px;font-weight:600;margin-bottom:16px">Permissões por Usuário</h3><div id="permGrid"></div></div></div>`;await Promise.all([ldU(),ldPz(),ldCl(),ldPerm()])}
function stbA(t,b){document.querySelectorAll('.tp').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));document.getElementById('tp'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('on');b.classList.add('on')}
async function ldU(){const{data}=await sb.from('perfis').select('*').order('nome');document.getElementById('tU').innerHTML=(data||[]).map(u=>`<tr><td><strong>${u.nome}</strong></td><td>${u.email}</td><td><span class="be" style="text-transform:capitalize">${u.perfil.replace('_',' ')}</span></td><td><span class="bdg ${u.ativo?'bok2':'ber2'}">${u.ativo?'Ativo':'Inativo'}</span></td><td><select class="fc" style="width:auto;padding:4px 8px;font-size:12px" onchange="upP('${u.id}',this.value)"><option value="producao" ${u.perfil==='producao'?'selected':''}>Produção</option><option value="conferencia" ${u.perfil==='conferencia'?'selected':''}>Conferência</option><option value="expedicao" ${u.perfil==='expedicao'?'selected':''}>Expedição</option><option value="visualizacao" ${u.perfil==='visualizacao'?'selected':''}>Visualização</option><option value="administrador" ${u.perfil==='administrador'?'selected':''}>Administrador</option></select></td></tr>`).join('')}
async function upP(id,p){const{error}=await sb.from('perfis').update({perfil:p}).eq('id',id);error?toast('Erro','er'):toast('Atualizado!')}
async function crUsr(){const n=document.getElementById('uuN').value.trim(),e=document.getElementById('uuE').value.trim(),s=document.getElementById('uuS').value,p=document.getElementById('uuP').value;if(!n||!e||!s){toast('Preencha tudo','er');return}const{error}=await sb.auth.signUp({email:e,password:s,options:{data:{nome:n,perfil:p}}});if(error){toast(error.message,'er');return}toast('Criado!');cM('mUsr');ldU()}
async function ldPz(){const{data}=await sb.from('configuracoes_prazo').select('*').order('aplicavel_a,ordem');document.getElementById('tPz').innerHTML=(data||[]).map(c=>`<tr><td><strong>${le(c.etapa_nome)}</strong></td><td><input type="number" class="fc" style="width:80px;display:inline" value="${c.prazo_dias}" min="0" onchange="upPz(${c.id},this.value)"></td><td><span class="bt ${c.aplicavel_a==='flash'?'bfl':'bf'}">${c.aplicavel_a==='flash'?'Flash':'Folheação'}</span></td><td>${c.requer_cataforetico?'Sim':'Não'}</td></tr>`).join('')}
async function upPz(id,d){const{error}=await sb.from('configuracoes_prazo').update({prazo_dias:parseInt(d)}).eq('id',id);error?toast('Erro','er'):toast('Atualizado!')}
async function ldCl(){const{data}=await sb.from('clientes').select('*').order('nome');document.getElementById('tCl').innerHTML=(data||[]).map(c=>`<tr><td><strong>${c.nome}</strong></td><td>${c.telefone||'—'}</td><td>${c.email||'—'}</td><td><span class="bdg ${c.ativo?'bok2':'ber2'}">${c.ativo?'Ativo':'Inativo'}</span></td></tr>`).join('')||'<tr><td colspan="4" class="tc tlt">Nenhum</td></tr>'}
async function ldPerm(){const{data:users}=await sb.from('perfis').select('id,nome').order('nome');const{data:perms}=await sb.from('permissoes_etapa').select('*');const ap=perms||[];let h='<div class="tw"><table><thead><tr><th>Usuário</th>';ET.forEach(e=>h+=`<th class="tc">${le(e)}</th>`);h+='</tr></thead><tbody>';(users||[]).forEach(u=>{h+=`<tr><td><strong>${u.nome}</strong></td>`;ET.forEach(e=>{const has=ap.some(p=>p.usuario_id===u.id&&p.etapa_nome===e&&p.pode_editar);h+=`<td class="tc"><input type="checkbox" ${has?'checked':''} onchange="tgPerm('${u.id}','${e}',this.checked)"></td>`});h+='</tr>'});h+='</tbody></table></div>';document.getElementById('permGrid').innerHTML=h}
async function tgPerm(uid,etapa,checked){if(checked){await sb.from('permissoes_etapa').upsert({usuario_id:uid,etapa_nome:etapa,pode_editar:true},{onConflict:'usuario_id,etapa_nome'})}else{await sb.from('permissoes_etapa').delete().eq('usuario_id',uid).eq('etapa_nome',etapa)}const{data}=await sb.from('permissoes_etapa').select('*');PERMS=data||[];toast('Permissão atualizada!')}

init();
</script>
</body>
</html>
